name: Sync version + tag

# chart.html is no longer committed here — it is gitignored on this repo and
# downloaded fresh by publish.yml at build time. This workflow only bumps the
# version and tags, which fires publish.yml.

on:
  repository_dispatch:
    types: [acttrader-charts-release]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Bump VERSION_NAME in gradle.properties
        run: |
          sed -i "s/^VERSION_NAME=.*/VERSION_NAME=${{ github.event.client_payload.version }}/" gradle.properties

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git diff --cached --quiet && echo "Nothing to commit, skipping." && exit 0
          git commit -m "chore: bump version to v${{ github.event.client_payload.version }}"

      - name: Push to main
        run: git push origin HEAD:main

      - name: Tag release
        run: |
          git tag "v${{ github.event.client_payload.version }}"
          git push origin "v${{ github.event.client_payload.version }}"
