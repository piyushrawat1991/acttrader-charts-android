name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Download chart.html from upstream release
        env:
          GH_TOKEN: ${{ secrets.CHARTS_REPO_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p acttradercharts/src/main/assets
          gh release download "v${VERSION}" \
            --repo piyushrawat1991/acttrader-charts \
            --pattern "chart.html" \
            --output acttradercharts/src/main/assets/chart.html \
            --clobber

      - name: Publish library
        run: ./gradlew :acttradercharts:publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
